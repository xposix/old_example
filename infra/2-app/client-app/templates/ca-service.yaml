apiVersion: v1
kind: Service
metadata:
  name: {{ include "client-app.fullname" . }}
  labels:
    {{- include "client-app.labels" . | nindent 4 }}
spec:
  type: {{ .Values.clientApp.service.type }}
  ports:
    - port: {{ .Values.clientApp.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "client-app.selectorLabels" . | nindent 4 }}
