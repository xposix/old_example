# Default values for client-app.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.
secretConfiguration:
  region_name: eu-west-2

clientApp:
  image:
    repository: 012345678901.dkr.ecr.eu-west-2.amazonaws.com/client-app
    pullPolicy: Always
    tag: latest
  configurationSecretName: /xenv_namex/3rd_party/xmyappx/configuration 
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  service:
    type: NodePort
    port: 8081

  ingress:
    enabled: true
    className: alb
    annotations:
      # https://kubernetes-sigs.gitlab.io/aws-load-balancer-controller/v2.5/guide/ingress/annotations/
      alb.ingress.kubernetes.io/scheme: internet-facing
      # alb.ingress.kubernetes.io/certificate-arn: {{.Values.clientApp.sslCertArn}}
      # external-dns.alpha.kubernetes.io/hostname: {{.Values.clientApp.primaryDomain}}
      alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS":443}]'
      alb.ingress.kubernetes.io/healthcheck-path: /health
      alb.ingress.kubernetes.io/healthcheck-interval-seconds: "15"
      alb.ingress.kubernetes.io/healthcheck-timeout-seconds: "5"
      alb.ingress.kubernetes.io/healthcheck-protocol: HTTP
      alb.ingress.kubernetes.io/healthcheck-healthy-threshold-count: "2"
      alb.ingress.kubernetes.io/healthcheck-unhealthy-threshold-count: "2"
      alb.ingress.kubernetes.io/success-codes: '200,302,307'
      alb.ingress.kubernetes.io/healthcheck-matcher: "200"
      alb.ingress.kubernetes.io/actions.ssl-redirect: '{"Type": "redirect", "RedirectConfig": { "Protocol": "HTTPS", "Port": "443", "StatusCode": "HTTP_301"}}'
      alb.ingress.kubernetes.io/ssl-policy: ELBSecurityPolicy-TLS13-1-2-2021-06
    hosts:
      - paths:
          - path: /
            pathType: Prefix
    tls: []

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # autoscaling:
  #   enabled: true
  #   minReplicas: 1
  #   maxReplicas: 100
  #   targetCPUUtilizationPercentage: 80
  #   targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  nodeSelector:
    intent: apps

  tolerations: []

  affinity: {}

celery:
  image:
    repository: 012345678901.dkr.ecr.eu-west-2.amazonaws.com/celery
    pullPolicy: Always
    tag: latest

  imagePullSecrets: []
  nameOverride: "celery"
  fullnameOverride: ""

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
      # TODO: eks.amazonaws.com/role-arn: {{.Values.clientApp.podRoleArn}}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  resources: {}
    # We usually recommend not to specify default resources and to leave this as a conscious
    # choice for the user. This also increases chances charts run on environments with little
    # resources, such as Minikube. If you do want to specify resources, uncomment the following
    # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
    # limits:
    #   cpu: 100m
    #   memory: 128Mi
    # requests:
    #   cpu: 100m
    #   memory: 128Mi

  # autoscaling:
  #   enabled: true
  #   minReplicas: 1
  #   maxReplicas: 100
  #   targetCPUUtilizationPercentage: 80
  #   targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []
  # - name: foo
  #   secret:
  #     secretName: mysecret
  #     optional: false

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []
  # - name: foo
  #   mountPath: "/etc/foo"
  #   readOnly: true

  nodeSelector:
    intent: apps

  tolerations: []

  affinity: {}

arangoDeployment:
  name: dev-cluster
  mode: Single # Or Cluster
  image: arangodb/arangodb:3.10.8
  environment: Production
  service:
    type: ClusterIP
    port: 8529

# schema source & default values: https://gitlab.com/bitnami/charts/blob/main/bitnami/redis/values.yaml
redis:
  auth:
    enabled: false
    password: ""
  master:
    persistence:
      storageClass: "gp3"
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenScaled: Delete
      whenDeleted: Delete
    readinessProbe:
      enabled: false
    livenessProbe:
      enabled: false
    nodeSelector:
      intent: apps

  replica:
    persistence:
      storageClass: "gp3"
    replicaCount: 0
    persistentVolumeClaimRetentionPolicy:
      enabled: true
      whenScaled: Delete
      whenDeleted: Delete
    readinessProbe:
      enabled: false
    livenessProbe:
      enabled: false
    nodeSelector:
      intent: apps
